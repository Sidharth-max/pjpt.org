server {
    listen 80;
    server_name paraslijaintirth.com www.paraslijaintirth.com;

    client_max_body_size 1000M;

    # Frontend Static Files
    location / {
        root /home/ubuntu/pjpt.org/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Sitemap & robots.txt — served by Express, not static files
    location ~ ^/(sitemap.*\.xml|video-sitemap\.xml|robots\.txt)$ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
