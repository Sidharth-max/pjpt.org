server {
    listen 80;
    server_name pjpt.org;

    # Frontend Static Files
    location / {
        root /path/to/your/project/pjpt.org/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: SSL configuration (Certbot recommended)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/pjpt.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pjpt.org/privkey.pem;
}
