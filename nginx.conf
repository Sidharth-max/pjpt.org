server {
    listen 80;
    server_name paraslijaintirth.com www.paraslijaintirth.com;

    client_max_body_size 1000M;

    root /home/ubuntu/pjpt.org/dist;
    index index.html;

    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/(sitemap.*\.xml|video-sitemap\.xml|robots\.txt)$ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Service worker & PWA bootstrap — never cache, so deploys take effect immediately
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache, must-revalidate" always;
        expires off;
    }

    # Content-hashed build assets (filenames change every build) — cache for a year
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # App shell and everything else — always revalidate so new builds are picked up
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}
